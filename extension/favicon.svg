<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000"><defs>
      <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6"/>
        <stop offset="48%" stop-color="#A83AFB"/>
        <stop offset="100%" stop-color="#FF5FB8"/>
      </linearGradient>
      <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#27104A"/>
        <stop offset="55%" stop-color="#12052B"/>
        <stop offset="100%" stop-color="#08020F"/>
      </linearGradient>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#A83AFB" stop-opacity=".32"/>
        <stop offset="100%" stop-color="#A83AFB" stop-opacity="0"/>
      </radialGradient>
      <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="18" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

