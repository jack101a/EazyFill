name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - flowpilot
      - production
    tags:
      - "v*"

env:
  IMAGE_NAME: ghcr.io/jack101a/eazyfill
  HAPROXY_IMAGE_NAME: ghcr.io/jack101a/eazyfill-haproxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: app-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,suffix=-latest
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=build-${{ github.run_number }}

      - name: HAProxy Docker metadata
        id: haproxy-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.HAPROXY_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,suffix=-latest
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=build-${{ github.run_number }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push HAProxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.haproxy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.haproxy-meta.outputs.tags }}
          labels: ${{ steps.haproxy-meta.outputs.labels }}
          cache-from: type=gha,scope=haproxy
          cache-to: type=gha,mode=max,scope=haproxy
