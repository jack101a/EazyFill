x-app-env: &app_env
  TZ: ${TZ}
  APP_CONFIG_PATH: ${APP_CONFIG_PATH}
  APP_MODE: ${APP_MODE}
  APP_ENV: ${APP_ENV}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS}
  RUN_BACKGROUND_TASKS: ${RUN_BACKGROUND_TASKS}
  DB_TYPE: ${DB_TYPE}
  LEGACY_DB_TYPE: ${LEGACY_DB_TYPE}
  POSTGRES_HOST: ${PGHOST}
  POSTGRES_PORT: ${PGPORT}
  POSTGRES_DB: ${PGDATABASE}
  POSTGRES_USER: ${PGUSER}
  POSTGRES_PASSWORD: ${PGPASSWORD}
  REDIS_ENABLED: ${REDIS_ENABLED}
  REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0
  REDIS_PREFIX: ${REDIS_PREFIX}
  SOLVER_QUEUE_BACKEND: ${SOLVER_QUEUE_BACKEND}
  SOLVER_QUEUE_FALLBACK_LOCAL: ${SOLVER_QUEUE_FALLBACK_LOCAL}
  SOLVER_JOB_TIMEOUT_SECONDS: ${SOLVER_JOB_TIMEOUT_SECONDS}
  SOLVER_JOB_ATTEMPTS: ${SOLVER_JOB_ATTEMPTS}
  SOLVER_RESULT_TTL_SECONDS: ${SOLVER_RESULT_TTL_SECONDS}
  AUTH_HASH_SALT: ${AUTH_HASH_SALT}
  ADMIN_TOKEN: ${ADMIN_TOKEN}
  ADMIN_USERNAME: ${ADMIN_USERNAME}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
  RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
  RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
  RAZORPAY_ORDER_TOKEN: ${RAZORPAY_ORDER_TOKEN}
  DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
  DISCORD_NOTIFY_ENABLED: ${DISCORD_NOTIFY_ENABLED}

services:
  postgres:
    image: postgres:16-alpine
    container_name: sa-helper-test2-postgres
    restart: unless-stopped
    init: true
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=${POSTGRES_MAX_WAL_SENDERS:-10}
      - -c
      - max_replication_slots=${POSTGRES_MAX_REPLICATION_SLOTS:-10}
      - -c
      - wal_keep_size=${POSTGRES_WAL_KEEP_SIZE:-1024MB}
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/postgres16:/var/lib/postgresql/data
    ports:
      - "${PG_BIND}:${PG_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 5
    networks:
      sa_helper_test2_network:
        aliases:
          - sahelpertest2_postgres

  postgres-replication-config:
    image: postgres:16-alpine
    restart: "no"
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: sahelpertest2_postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-sa_helper_replica}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-}
      POSTGRES_REPLICATION_CIDR: ${POSTGRES_REPLICATION_CIDR:-10.99.0.2/32}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/postgres16:/var/lib/postgresql/data
    command:
      - sh
      - -lc
      - |
        if [ -z "$${POSTGRES_REPLICATION_PASSWORD:-}" ]; then
          echo "POSTGRES_REPLICATION_PASSWORD is empty; skipping replication user setup."
          exit 0
        fi
        case "$${POSTGRES_REPLICATION_USER}" in
          ""|*[!A-Za-z0-9_]*)
            echo "POSTGRES_REPLICATION_USER must contain only letters, numbers, and underscore." >&2
            exit 2
            ;;
        esac
        case "$${POSTGRES_REPLICATION_USER}" in
          [A-Za-z_]*)
            ;;
          *)
            echo "POSTGRES_REPLICATION_USER must start with a letter or underscore." >&2
            exit 2
            ;;
        esac
        escaped_password=$$(printf '%s' "$${POSTGRES_REPLICATION_PASSWORD}" | sed "s/'/''/g")
        psql -v ON_ERROR_STOP=1 -c "DO \$$\$$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '$${POSTGRES_REPLICATION_USER}') THEN CREATE ROLE $${POSTGRES_REPLICATION_USER} WITH REPLICATION LOGIN PASSWORD '$${escaped_password}'; ELSE ALTER ROLE $${POSTGRES_REPLICATION_USER} WITH REPLICATION LOGIN PASSWORD '$${escaped_password}'; END IF; END \$$\$$;"
        hba_line="host replication $${POSTGRES_REPLICATION_USER} $${POSTGRES_REPLICATION_CIDR} scram-sha-256"
        touch "$${PGDATA}/pg_hba.conf"
        grep -Fxq "$${hba_line}" "$${PGDATA}/pg_hba.conf" || printf '\n%s\n' "$${hba_line}" >> "$${PGDATA}/pg_hba.conf"
        psql -v ON_ERROR_STOP=1 -c "SELECT pg_reload_conf();"
    networks:
      - sa_helper_test2_network

  redis:
    image: redis:7-alpine
    container_name: sa-helper-test2-redis
    restart: unless-stopped
    init: true
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      TZ: ${TZ}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/redis:/data
    ports:
      - "${REDIS_BIND}:${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 5
    networks:
      sa_helper_test2_network:
        aliases:
          - sahelpertest2_redis

  migrate:
    image: ${SA_HELPER_IMAGE}
    restart: "no"
    init: true
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "cd /app/backend && python -m alembic upgrade head"]
    environment:
      <<: *app_env
      INSTANCE_ID: ${INSTANCE_ID_PREFIX}-migrate
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/logs:/app/backend/logs
      - ${CONFIG_PATH}/sahelpertest2/data:/app/data
      - ${CONFIG_PATH}/sahelpertest2/config:/app/backend/config
    networks:
      - sa_helper_test2_network

  gateway-1:
    image: ${SA_HELPER_IMAGE}
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app_env
      INSTANCE_ID: ${INSTANCE_ID_PREFIX}-gateway-1
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/logs:/app/backend/logs
      - ${CONFIG_PATH}/sahelpertest2/data:/app/data
      - ${CONFIG_PATH}/sahelpertest2/config:/app/backend/config
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    networks:
      sa_helper_test2_network:
        aliases:
          - sahelpertest2_gateway_1

  gateway-2:
    image: ${SA_HELPER_IMAGE}
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    depends_on:
      gateway-1:
        condition: service_healthy
    environment:
      <<: *app_env
      INSTANCE_ID: ${INSTANCE_ID_PREFIX}-gateway-2
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/logs:/app/backend/logs
      - ${CONFIG_PATH}/sahelpertest2/data:/app/data
      - ${CONFIG_PATH}/sahelpertest2/config:/app/backend/config
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    networks:
      sa_helper_test2_network:
        aliases:
          - sahelpertest2_gateway_2

  api-haproxy:
    image: haproxy:2.9-alpine
    container_name: sa-helper-test2-haproxy
    restart: unless-stopped
    init: true
    depends_on:
      gateway-1:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
    environment:
      HAPROXY_NODE_B_GATEWAY: ${HAPROXY_NODE_B_GATEWAY:-}
      HAPROXY_NODE_B_BACKUP: ${HAPROXY_NODE_B_BACKUP:-true}
      HAPROXY_NODE_B_WEIGHT: ${HAPROXY_NODE_B_WEIGHT:-1}
    ports:
      - "${PUBLIC_HTTP_BIND}:${PORT}:80"
    command:
      - sh
      - -lc
      - |
        cat > /tmp/haproxy.cfg <<'EOF'
        global
            log stdout format raw local0
            maxconn 4096

        defaults
            mode http
            log global
            option httplog
            option dontlognull
            option forwardfor
            timeout connect 10s
            timeout client 120s
            timeout server 120s

        resolvers docker
            nameserver dns 127.0.0.11:53
            resolve_retries 3
            timeout resolve 1s
            timeout retry 1s
            hold valid 10s

        frontend http_in
            bind *:80
            http-request set-header X-Forwarded-Proto http unless { req.hdr(X-Forwarded-Proto) -m found }
            http-request set-header X-Real-IP %[src] unless { req.hdr(X-Real-IP) -m found }
            default_backend sa_helper_api

        backend sa_helper_api
            balance leastconn
            option httpchk GET /ready
            http-check expect status 200
            server gateway1 sahelpertest2_gateway_1:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none
            server gateway2 sahelpertest2_gateway_2:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none
        EOF
        if [ -n "$${HAPROXY_NODE_B_GATEWAY:-}" ]; then
          node_b_mode=""
          if [ "$${HAPROXY_NODE_B_BACKUP:-true}" = "true" ] || [ "$${HAPROXY_NODE_B_BACKUP:-true}" = "1" ]; then
            node_b_mode="backup"
          else
            node_b_mode="weight $${HAPROXY_NODE_B_WEIGHT:-1}"
          fi
          printf '    server nodeb %s check inter 5s fall 3 rise 2 %s\n' "$${HAPROXY_NODE_B_GATEWAY}" "$${node_b_mode}" >> /tmp/haproxy.cfg
        fi
        exec haproxy -W -db -f /tmp/haproxy.cfg
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      sa_helper_test2_network:
        aliases:
          - sahelpertest2_haproxy

  captcha-worker:
    image: ${SA_HELPER_IMAGE}
    scale: 2
    restart: unless-stopped
    init: true
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    environment:
      <<: *app_env
      INSTANCE_ID: ${INSTANCE_ID_PREFIX}-captcha-worker
      SOLVER_WORKER_CONCURRENCY: ${CAPTCHA_WORKER_CONCURRENCY}
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/logs:/app/backend/logs
      - ${CONFIG_PATH}/sahelpertest2/data:/app/data
      - ${CONFIG_PATH}/sahelpertest2/config:/app/backend/config
    networks:
      - sa_helper_test2_network

  scheduler:
    image: ${SA_HELPER_IMAGE}
    restart: unless-stopped
    init: true
    healthcheck:
      disable: true
    depends_on:
      gateway-1:
        condition: service_healthy
    command: ["python", "-m", "app.scheduler"]
    environment:
      <<: *app_env
      INSTANCE_ID: ${INSTANCE_ID_PREFIX}-scheduler
    volumes:
      - ${CONFIG_PATH}/sahelpertest2/logs:/app/backend/logs
      - ${CONFIG_PATH}/sahelpertest2/data:/app/data
      - ${CONFIG_PATH}/sahelpertest2/config:/app/backend/config
    networks:
      - sa_helper_test2_network

networks:
  sa_helper_test2_network:
    name: sa-helper-test2-network
