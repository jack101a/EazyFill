global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    timeout connect 10s
    timeout client 120s
    timeout server 120s

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend http_in
    bind *:80
    http-request set-header X-Forwarded-Proto http unless { req.hdr(X-Forwarded-Proto) -m found }
    http-request set-header X-Real-IP %[src] unless { req.hdr(X-Real-IP) -m found }
    acl auth_path path_beg /v2/auth
    use_backend eazyfill_auth_api if auth_path
    default_backend eazyfill_api

backend eazyfill_auth_api
    option httpchk GET /ready
    http-check expect status 200
    server gateway1 test-stack-eazyfill-gateway-1:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none

backend eazyfill_api
    balance leastconn
    option httpchk GET /ready
    http-check expect status 200
    server gateway1 test-stack-eazyfill-gateway-1:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none
    server gateway2 test-stack-eazyfill-gateway-2:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none
